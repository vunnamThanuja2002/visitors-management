name: Project CI (Windows)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ----------------- HTML & CSS -----------------
  frontend:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Validate HTML files
        run: |
          npx htmlhint "**/*.html"

      - name: Lint CSS files
        run: |
          npm install -g stylelint stylelint-config-standard
          npx stylelint "**/*.css"

  # ----------------- Python -----------------
  python-tests:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if exist requirements.txt ( pip install -r requirements.txt )

      - name: Run tests
        run: |
          if exist tests ( pytest ) else ( echo "No tests found" )

  # ----------------- Java -----------------
  java-build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Build with Maven
        run: |
          if exist pom.xml ( mvn -B package --file pom.xml ) else ( echo "No pom.xml found" 